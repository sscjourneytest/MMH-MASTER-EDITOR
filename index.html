<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMH MASTER EDITOR - Pro Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Unified CSS from Template test-t2-s (8).html */
        :root {
            --accent: #0b5ed7;
            --accent-dark: #094bc0;
            --success: #198754;
            --danger: #dc3545;
            --warning: #ffc107;
            --border-color: #333333;
            --bg-main: #f5f7fa;
            --header-height: 60px;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: #212121; overflow: hidden; height: 100vh; }

        /* --- Question Card Styling (Direct Mirror) --- */
        .card { background: #ffffff; border: 1.25px solid var(--border-color); border-radius: 0; width: 100%; box-sizing: border-box; }
        .qbar { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; border-bottom: 1.25px solid var(--border-color); background: #fff; }
        .qmeta { font-size: 14px; font-weight: 600; color: #111; }
        .qtext { padding: 12px 14px; font-size: 16px; line-height: 1.5; color: #111; font-weight: 500; border-bottom: 1.25px solid var(--border-color); background: #fff; }
        
        /* Options Styling */
        .opt { display: grid; grid-template-columns: 48px 1fr; border-bottom: 1.25px solid var(--border-color); background: #fff; }
        .opt.correct { background-color: #dff5e7; }
        .opt-text { padding: 10px 14px; font-size: 15px; color: #111; display: block; line-height: 1.5; }
        .custom-radio { position: relative; display: flex; align-items: center; justify-content: center; border-right: 1.25px solid var(--border-color); width: 100%; height: 100%; min-height: 42px; }
        .custom-radio::before { content: ""; width: 18px; height: 18px; border: 2px solid #757575; border-radius: 50%; }
        .opt.correct .custom-radio::before { border-color: var(--success); background: var(--success); }
        .opt.correct .custom-radio::after { content: ""; position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%; }

        /* Palette States */
        .p-item { width: 42px; height: 35px; display: flex; align-items: center; justify-content: center; border: 1px solid #ababab; cursor: pointer; font-weight: 700; font-size: 13px; background: linear-gradient(to bottom, #ffffff 0%, #f2f2f2 100%); border-radius: 2px; }
        .p-active { clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 50% 100%, 0% 70%); background: var(--danger) !important; color: white; border: none; }
        .p-edited { background: var(--success) !important; color: white; border-color: var(--success); }
        .p-reported { background: var(--accent) !important; color: white; border-color: var(--accent); }

        /* Layout */
        .section-nav { display: flex; gap: 8px; padding: 10px 16px; background: #fff; border-bottom: 2px solid #eee; overflow-x: auto; white-space: nowrap; }
        .sec-btn { padding: 8px 18px; background: #0000ff; color: #fff; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; font-size: 13px; text-transform: uppercase; }
        .sec-btn.active { background: #008000 !important; }

        /* Mobile Console */
        #mobileConsole { position: fixed; bottom: 70px; left: 0; right: 0; height: 25vh; background: #1e1e1e; color: #00ff00; font-family: 'Fira Code', monospace; font-size: 11px; padding: 10px; overflow-y: auto; z-index: 1000; display: none; border-top: 2px solid #444; }

        /* MathJax & Scrollbars */
        mjx-container { max-width: 100% !important; overflow-x: auto !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>

    <script>
        window.MathJax = { tex: { inlineMath: [['\\(', '\\)']], displayMath: [['$$', '$$']] }, chtml: { displayAlign: 'left' } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body class="flex flex-col">

    <div id="mobileConsole"></div>

    <header class="bg-white border-b px-4 py-2 flex items-center justify-between shadow-sm z-50 h-[60px]">
        <div class="flex items-center gap-3">
            <div>
                <h1 class="text-sm font-black text-blue-700 leading-none">MMH MASTER</h1>
                <span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest">Editor v2.5</span>
            </div>
            <div class="flex items-center bg-gray-100 rounded-lg px-2 py-1 border border-gray-200">
                <input id="targetQuizId" type="text" placeholder="ID" class="bg-transparent outline-none text-[10px] font-bold w-20">
                <input id="targetPath" type="text" placeholder="Path" class="bg-transparent outline-none text-[10px] font-bold w-24 border-l pl-2 ml-2 border-gray-300">
                <button onclick="fetchQuizData()" class="text-blue-600 font-black text-[10px] ml-2">LOAD</button>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleConsole()" class="p-1.5 rounded bg-gray-800 text-white text-[9px] font-bold">LOGS</button>
            <select id="langSelect" onchange="changeLang(this.value)" class="text-[10px] font-bold border rounded px-1">
                <option value="en">EN</option>
                <option value="hi">HI</option>
                <option value="bilingual">BI</option>
            </select>
        </div>
    </header>

    <div id="sectionNav" class="section-nav hidden"></div>

    <main class="flex-1 flex overflow-hidden">
        
        <section class="flex-1 overflow-y-auto p-2 lg:p-6 bg-gray-50 no-scrollbar pb-32">
            
            <div id="metaBox" class="max-w-3xl mx-auto mb-4 bg-white border border-[#333] hidden">
                <div class="p-3 flex justify-between items-center bg-gray-50 border-b border-[#333]">
                    <span class="text-[11px] font-bold text-gray-600">QUIZ ID: <span id="metaId" class="text-blue-600"></span></span>
                    <button onclick="toggleMetaEditor()" class="text-[10px] font-black text-blue-600 underline">EDIT RAW META</button>
                </div>
                <div id="metaEditor" class="hidden p-3 bg-gray-900">
                    <textarea id="metaJson" class="w-full h-40 bg-black text-green-400 p-2 text-[10px] font-mono rounded"></textarea>
                    <button onclick="saveMeta()" class="mt-2 w-full bg-green-600 text-white py-2 text-[10px] font-black">APPLY META CHANGES</button>
                </div>
            </div>

            <div id="questionArea" class="max-w-3xl mx-auto hidden">
                <div class="card">
                    <div class="qbar">
                        <div class="qmeta">Question: <span id="qNum">1</span> <span id="qIdDisplay" class="ml-4 text-[10px] text-gray-400 font-mono"></span></div>
                        <button onclick="toggleEditor()" class="bg-blue-600 text-white px-3 py-1 rounded text-[10px] font-bold">EDIT JSON</button>
                    </div>

                    <div class="qtext">
                        <div id="qText"></div>
                        <div id="qImage" class="mt-2"></div>
                    </div>
                    
                    <div id="optionsGrid" class="options"></div>

                    <div id="solArea" class="p-4 bg-blue-50 border-t border-[#333] hidden">
                        <div class="text-[11px] font-bold text-blue-700 uppercase mb-2">Solution Explanation</div>
                        <div id="solText" class="text-sm text-gray-700"></div>
                        <div id="solImage" class="mt-3"></div>
                    </div>
                </div>

                <div id="inlineEditor" class="hidden mt-4 bg-gray-900 border-2 border-blue-500 p-4 rounded-xl">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-blue-400 text-[10px] font-black">JSON SOURCE</span>
                        <button onclick="saveQEdit()" class="bg-green-600 text-white px-4 py-1 rounded text-[10px] font-bold">SAVE TO LOCAL</button>
                    </div>
                    <textarea id="jsonBox" spellcheck="false" class="w-full h-80 bg-black text-green-400 p-3 text-xs font-mono rounded outline-none"></textarea>
                </div>
            </div>
        </section>

        <aside id="sidebar" class="w-64 border-l bg-[#dae5f0] flex flex-col z-40 lg:relative fixed right-[-100%] top-[60px] h-full transition-all duration-300">
            <div class="p-3 border-b bg-white flex justify-between items-center">
                <span class="font-black text-[10px] uppercase">Palette</span>
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-500">✕</button>
            </div>
            <div id="palette" class="flex-1 overflow-y-auto p-3 grid grid-cols-4 gap-2 content-start no-scrollbar"></div>
            <div class="p-3 bg-white border-t space-y-2">
                <div class="flex items-center gap-2 text-[9px] font-bold">
                    <span class="w-3 h-3 bg-red-600 rounded-sm"></span> Current
                    <span class="w-3 h-3 bg-green-600 rounded-sm"></span> Edited
                </div>
            </div>
        </aside>
    </main>

    <div class="fixed bottom-0 left-0 right-0 h-[70px] bg-white border-t flex items-center justify-between px-4 z-[100] gap-2">
        <button onclick="prevQ()" class="flex-1 h-12 bg-[#0b5ed7] text-white rounded-lg font-bold text-xs uppercase shadow-md">Previous</button>
        <button onclick="openUpdateModal()" id="syncBtn" class="hidden flex-1 h-12 bg-purple-700 text-white rounded-lg font-black text-[11px] uppercase shadow-lg animate-pulse">Sync Prod</button>
        <button onclick="nextQ()" class="flex-1 h-12 bg-[#0b5ed7] text-white rounded-lg font-bold text-xs uppercase shadow-md">Save & Next</button>
    </div>

    <div id="syncModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-[200] p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-md p-6">
            <h2 class="text-xl font-black text-blue-700 mb-4">PRODUCTION PUSH</h2>
            <div id="changeLog" class="bg-gray-100 p-3 h-40 overflow-y-auto text-[10px] font-mono mb-4 border rounded"></div>
            <div class="flex gap-2">
                <button onclick="closeSyncModal()" class="flex-1 py-3 bg-gray-200 rounded-xl font-bold">ABORT</button>
                <button onclick="pushToProd()" id="finalPushBtn" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-black">PUSH TO MAIN</button>
            </div>
        </div>
    </div>

    <button onclick="toggleSidebar()" class="lg:hidden fixed bottom-20 right-4 w-12 h-12 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center z-[110]">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
    </button>

    <script>
        const WORKER_BASE = "https://mmh-question-reports-1.sscgkgspreparation.workers.dev/";
        let MODIFIED_QUIZ = null;
        let QUESTIONS = [];
        let currentIdx = 0;
        let currentSec = "";
        let currentLang = "en";
        let editedIds = new Set();
        let reportedId = null;

        function log(msg, type = 'info') {
            const c = document.getElementById('mobileConsole');
            const div = document.createElement('div');
            div.className = `p-1 border-b border-gray-800 ${type === 'error' ? 'text-red-500' : ''}`;
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            c.appendChild(div);
            c.scrollTop = c.scrollHeight;
        }

        function toggleConsole() { const c = document.getElementById('mobileConsole'); c.style.display = c.style.display === 'none' ? 'block' : 'none'; }

        async function fetchQuizData() {
            const id = document.getElementById('targetQuizId').value.trim();
            const path = document.getElementById('targetPath').value.trim();
            if(!id || !path) return alert("ID and Path required!");
            
            log(`Fetching ${id}...`);
            try {
                const res = await fetch(`${WORKER_BASE}?action=GET_QUIZ&id=${id}&path=${path}`);
                const data = await res.json();
                MODIFIED_QUIZ = data.quiz;
                initUI();
            } catch (err) { log("Fetch failed", "error"); }
        }

        function initUI() {
            const secs = Object.keys(MODIFIED_QUIZ.sections);
            renderSectionTabs(secs);
            switchSection(secs[0]);
            document.getElementById('metaBox').classList.remove('hidden');
            document.getElementById('questionArea').classList.remove('hidden');
            document.getElementById('syncBtn').classList.remove('hidden');
            document.getElementById('sectionNav').classList.remove('hidden');
            document.getElementById('metaId').innerText = MODIFIED_QUIZ.meta.id;
            if(reportedId) jumpToId(reportedId);
        }

        function renderSectionTabs(secs) {
            const nav = document.getElementById('sectionNav');
            nav.innerHTML = "";
            secs.forEach(s => {
                const btn = document.createElement('button');
                btn.className = `sec-btn ${s === currentSec ? 'active' : ''}`;
                btn.innerText = s;
                btn.onclick = () => switchSection(s);
                nav.appendChild(btn);
            });
        }

        function switchSection(name) {
            currentSec = name;
            const raw = MODIFIED_QUIZ.sections[name];
            QUESTIONS = Array.isArray(raw) ? raw : raw.questions;
            renderPalette();
            renderQuestion(0);
            renderSectionTabs(Object.keys(MODIFIED_QUIZ.sections));
        }

        function renderQuestion(idx) {
            currentIdx = idx;
            const q = QUESTIONS[idx];
            document.getElementById('qNum').innerText = idx + 1;
            document.getElementById('qIdDisplay').innerText = `ID: ${q.id}`;
            document.getElementById('qText').innerHTML = applyBold(parseContent(q.question));
            
            // Images
            const imgBox = document.getElementById('qImage');
            imgBox.innerHTML = q.question_image ? `<img src="${q.question_image}" class="max-w-[90%] mx-auto block border">` : "";

            // Options (Mirror Template)
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = "";
            [1, 2, 3, 4, 5].forEach(i => {
                if(q[`option_${i}`]) {
                    const div = document.createElement('div');
                    div.className = `opt ${String(q.answer) === String(i) ? 'correct' : ''}`;
                    div.innerHTML = `<div class="custom-radio"></div><div class="opt-text">${applyBold(parseContent(q[`option_${i}`]))}</div>`;
                    grid.appendChild(div);
                }
            });

            // Solution
            const sol = document.getElementById('solArea');
            if(q.solution_text || q.solution_image) {
                sol.classList.remove('hidden');
                document.getElementById('solText').innerHTML = applyBold(parseContent(q.solution_text));
                document.getElementById('solImage').innerHTML = q.solution_image ? `<img src="${q.solution_image}" class="max-w-full border">` : "";
            } else sol.classList.add('hidden');

            if(window.MathJax) MathJax.typesetPromise();
            highlightPalette();
            if(!document.getElementById('inlineEditor').classList.contains('hidden')) {
                document.getElementById('jsonBox').value = JSON.stringify(q, null, 4);
            }
        }

        function parseContent(obj) {
            if(!obj) return "";
            if(typeof obj === 'string') return obj;
            if(currentLang === 'bilingual') return (obj.en || "") + "<hr class='my-2 border-dashed'>" + (obj.hi || "");
            return obj[currentLang] || obj.en || "";
        }

        function applyBold(html) { return html.replace(/\*\*(.*?)\*\*/g, '<strong style="font-weight: 800; color: #000;">$1</strong>'); }

        function renderPalette() {
            const p = document.getElementById('palette');
            p.innerHTML = "";
            QUESTIONS.forEach((_, i) => {
                const btn = document.createElement('div');
                btn.className = "p-item";
                btn.innerText = i + 1;
                btn.onclick = () => renderQuestion(i);
                p.appendChild(btn);
            });
        }

        function highlightPalette() {
            const items = document.querySelectorAll('.p-item');
            items.forEach((item, i) => {
                const qId = String(QUESTIONS[i].id);
                item.classList.remove('p-active', 'p-edited', 'p-reported');
                if(i === currentIdx) item.classList.add('p-active');
                if(editedIds.has(qId)) item.classList.add('p-edited');
                if(qId === reportedId) item.classList.add('p-reported');
            });
        }

        function toggleEditor() { 
            const ed = document.getElementById('inlineEditor');
            ed.classList.toggle('hidden');
            if(!ed.classList.contains('hidden')) document.getElementById('jsonBox').value = JSON.stringify(QUESTIONS[currentIdx], null, 4);
        }

        function saveQEdit() {
            try {
                const updated = JSON.parse(document.getElementById('jsonBox').value);
                QUESTIONS[currentIdx] = updated;
                editedIds.add(String(updated.id));
                log(`Saved ID ${updated.id}`);
                renderQuestion(currentIdx);
            } catch (e) { alert("JSON Error"); }
        }

        function nextQ() { if(currentIdx < QUESTIONS.length - 1) renderQuestion(currentIdx + 1); }
        function prevQ() { if(currentIdx > 0) renderQuestion(currentIdx - 1); }

        function toggleMetaEditor() { document.getElementById('metaEditor').classList.toggle('hidden'); document.getElementById('metaJson').value = JSON.stringify(MODIFIED_QUIZ.meta, null, 4); }
        function saveMeta() { try { MODIFIED_QUIZ.meta = JSON.parse(document.getElementById('metaJson').value); toggleMetaEditor(); log("Meta Updated"); } catch(e){alert("JSON Error");} }

        function openUpdateModal() {
            document.getElementById('changeLog').innerText = `Folder: ${currentSec}\nChanges: ${editedIds.size} questions modified.`;
            document.getElementById('syncModal').classList.remove('hidden');
        }

        function closeSyncModal() { document.getElementById('syncModal').classList.add('hidden'); }

        async function pushToProd() {
            const btn = document.getElementById('finalPushBtn');
            btn.innerText = "UPLOADING..."; btn.disabled = true;
            try {
                const res = await fetch(`${WORKER_BASE}?action=UPDATE_QUIZ&id=${document.getElementById('targetQuizId').value}&path=${document.getElementById('targetPath').value}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ updatedData: MODIFIED_QUIZ })
                });
                if(res.ok) { alert("Sync Successful!"); location.reload(); }
            } catch (e) { alert("Push failed"); btn.disabled = false; }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('fixed'); document.getElementById('sidebar').classList.toggle('right-0'); document.getElementById('sidebar').classList.toggle('right-[-100%]'); }
        function changeLang(v) { currentLang = v; renderQuestion(currentIdx); }

        function jumpToId(id) {
            for(const s in MODIFIED_QUIZ.sections) {
                const qs = Array.isArray(MODIFIED_QUIZ.sections[s]) ? MODIFIED_QUIZ.sections[s] : MODIFIED_QUIZ.sections[s].questions;
                const idx = qs.findIndex(q => String(q.id) === String(id));
                if(idx !== -1) { switchSection(s); renderQuestion(idx); break; }
            }
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const startapp = params.get('startapp');
            if(startapp) {
                const [id, path, qid] = startapp.split('__');
                document.getElementById('targetQuizId').value = id;
                document.getElementById('targetPath').value = path.replace(/_/g, '/');
                reportedId = qid;
                fetchQuizData();
            }
        };
    </script>
</body>
</html>
