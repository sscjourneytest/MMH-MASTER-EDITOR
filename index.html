<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>MMH MASTER EDITOR - Pro Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    <style>
        :root {
            --accent: #0b5ed7;
            --accent-dark: #094bc0;
            --success: #198754;
            --danger: #dc3545;
            --warning: #ffc107;
            --muted: #6c757d;
            --bg-color: #f4f7fa;
            --border-color: #333333;
            --header-height: 60px;
            --edited: #8b5cf6;
            --reported: #f97316;
        }

        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            color: #212121;
            overflow-x: hidden;
        }

        /* Question Card & Container - Deto Protocol */
        .card {
            background: #ffffff;
            border: 1.25px solid var(--border-color);
            border-radius: 0;
            padding: 0;
            margin-bottom: 20px;
            width: 100%;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        .qbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            border-bottom: 1.25px solid var(--border-color);
            background: #fff;
        }

        .qtext {
            padding: 12px 14px;
            font-size: 16px;
            line-height: 1.5;
            color: #111111;
            font-weight: 500;
            border-bottom: 1.25px solid var(--border-color);
            background: #fff;
        }

        .qtext strong, .opt-text strong {
            font-weight: 800;
            color: #000;
        }

        /* Options Style */
        .opt {
            display: grid;
            grid-template-columns: 48px 1fr;
            border-bottom: 1.25px solid var(--border-color);
            background: #fff;
            margin: 0;
            cursor: pointer;
            transition: 0.2s;
        }
        .opt.correct { background: #dff5e7; }
        .opt-text { padding: 10px 14px; font-size: 15px; color: #111111; line-height: 1.5; }

        .custom-radio {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1.25px solid var(--border-color);
            width: 100%; height: 100%; min-height: 42px;
        }
        .custom-radio::before {
            content: ""; width: 18px; height: 18px;
            border: 2px solid #757575; border-radius: 50%;
        }
        .correct .custom-radio::after {
            content: ""; position: absolute; width: 10px; height: 10px;
            background: var(--success); border-radius: 50%;
        }

        /* MathJax & Tables */
        mjx-container { max-width: 100% !important; overflow-x: auto !important; }
        .table-wrapper { width: 100%; overflow-x: auto; margin: 15px 0; border-radius: 8px; border: 1px solid #dee2e6; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #dee2e6; text-align: center; }

        /* Palette States */
        .p-item { width: 42px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 2px; border: 1px solid #ababab; background: linear-gradient(to bottom, #fff 0%, #f2f2f2 100%); font-weight: 700; cursor: pointer; position: relative; }
        .p-active { border: 2px solid var(--accent) !important; box-shadow: 0 0 8px rgba(11,94,215,0.4); }
        .p-edited { background: var(--edited) !important; color: white; border-color: #6d28d9; }
        .p-reported { background: var(--reported) !important; color: white; border-color: #c2410c; }
        .p-both { background: linear-gradient(135deg, var(--reported) 50%, var(--edited) 50%) !important; color: white; }

        @media (min-width: 1024px) {
            #sidebar { position: fixed; right: 0; top: var(--header-height); width: 320px; height: calc(100vh - var(--header-height) - 60px); }
            #mainContent { margin-right: 320px; }
        }
        @media (max-width: 1023px) {
            #sidebar { position: fixed; right: -320px; top: 0; height: 100%; width: 300px; z-index: 50; transition: 0.3s; }
            #sidebar.open { right: 0; }
        }

        #mobileConsole {
            position: fixed; bottom: 60px; left: 0; right: 0; height: 25vh;
            background: #1a1a1a; color: #00ff00; font-family: 'Fira Code', monospace;
            font-size: 11px; padding: 10px; overflow-y: auto; z-index: 45; border-top: 2px solid #444; display: none;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="mobileConsole"></div>

    <header class="bg-white border-b h-[60px] px-4 flex items-center justify-between shadow-sm z-[60] sticky top-0">
        <div class="flex items-center gap-4">
            <div>
                <h1 class="text-blue-700 font-black text-lg leading-none">MMH MASTER</h1>
                <p class="text-[8px] font-bold text-gray-400 tracking-widest uppercase">Production Hub</p>
            </div>
            <div class="hidden md:flex bg-gray-100 border rounded-lg px-2 py-1 items-center gap-2">
                <input id="targetQuizId" type="text" placeholder="Quiz ID" class="bg-transparent text-xs font-bold w-24 outline-none">
                <input id="targetPath" type="text" placeholder="Path" class="bg-transparent text-xs font-bold w-32 border-l pl-2 outline-none">
                <button onclick="fetchQuizData()" class="text-blue-600 font-black text-[10px] uppercase ml-1">LOAD</button>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleConsole()" class="bg-gray-800 text-white text-[10px] font-bold px-3 py-1.5 rounded">CONSOLE</button>
            <button onclick="toggleSidebar()" class="lg:hidden bg-blue-600 text-white p-1.5 rounded">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section id="mainContent" class="flex-1 overflow-y-auto p-4 lg:p-8 no-scrollbar pb-32">
            
            <div id="metaContainer" class="max-w-4xl mx-auto mb-4 bg-white border-[1.25px] border-black p-3 hidden">
                <div class="flex justify-between items-center">
                    <div class="text-xs font-bold uppercase">Quiz: <span id="metaIdDisp" class="text-blue-600">--</span></div>
                    <button onclick="toggleMetaEditor()" class="text-[10px] font-black bg-gray-200 px-3 py-1 rounded">EDIT META</button>
                </div>
                <div id="metaDetails" class="hidden mt-3 pt-3 border-t border-dashed">
                    <textarea id="metaJson" class="w-full h-40 font-mono text-[11px] p-3 bg-gray-50 border rounded"></textarea>
                    <button onclick="saveMeta()" class="mt-2 bg-green-600 text-white text-[10px] font-bold px-4 py-2 rounded">SAVE META</button>
                </div>
            </div>

            <div id="sectionNav" class="max-w-4xl mx-auto mb-4 flex gap-2 overflow-x-auto no-scrollbar py-1"></div>

            <div id="questionArea" class="max-w-4xl mx-auto hidden">
                <div id="quizCard" class="card">
                                    <div class="qbar">
                        <div class="qmeta font-bold text-sm">
                            Question: <span id="qNum">1</span> 
                            <span id="editStatus" class="ml-3 text-[10px] text-purple-600 hidden">● SAVED LOCALLY</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="flex items-center gap-2 mr-2">
                                <span class="text-[9px] font-black uppercase text-gray-400">View:</span>
                                <select id="cardLangSelect" class="text-[11px] font-bold border rounded px-1 outline-none bg-gray-50">
                                    <option value="en">English</option>
                                    <option value="hi">हिन्दी</option>
                                    <option value="bilingual">EN+HI</option>
                                </select>
                            </div>
                            <button onclick="toggleEditor()" class="text-blue-600">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                        </div>
                    </div>

             
                    <div class="qtext">
                        <div id="qTextBody"></div>
                        <div id="qImageBox" class="mt-3"></div>
                    </div>
                    <div id="optionsGrid"></div>
                    <div id="solArea" class="hidden p-4 bg-[#f0f7ff] border-t-[1.25px] border-black">
                        <div class="text-[10px] font-black text-blue-600 uppercase mb-2">Solution Explanation:</div>
                        <div id="solTextBody" class="text-sm"></div>
                        <div id="solImageBox" class="mt-3"></div>
                    </div>
                </div>

                <div id="inlineEditor" class="hidden bg-gray-900 rounded-lg p-4 mt-4 shadow-2xl">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-blue-400 text-[10px] font-black uppercase tracking-widest">Question JSON Source</span>
                        <div class="flex gap-2">
                            <button onclick="resetCurrentQ()" class="text-gray-400 text-[10px] font-bold px-2">RESET</button>
                            <button onclick="saveQEdit()" class="bg-green-600 text-white text-[10px] font-black px-3 py-1 rounded">SAVE LOCAL</button>
                        </div>
                    </div>
                    <textarea id="jsonBox" spellcheck="false" class="w-full h-80 bg-gray-800 text-green-400 p-4 font-mono text-xs rounded-md outline-none focus:ring-1 ring-blue-500"></textarea>
                </div>
            </div>
        </section>

        <aside id="sidebar" class="bg-white border-l flex flex-col shadow-lg">
            <div class="p-4 bg-gray-50 border-b font-black text-[11px] uppercase tracking-widest">Question Palette</div>
            <div class="p-3 border-b">
                <input id="jumpIdx" type="number" placeholder="Jump to #" class="w-full border p-2 rounded text-xs text-center font-bold">
            </div>
            <div id="paletteGrid" class="flex-1 overflow-y-auto p-4 grid grid-cols-4 sm:grid-cols-5 lg:grid-cols-4 gap-2 content-start no-scrollbar"></div>
            <div class="p-4 bg-gray-100 border-t">
                <button onclick="openSyncModal()" class="w-full bg-blue-600 text-white font-black text-xs py-3 rounded shadow-lg hover:bg-blue-700 uppercase">Update GitHub</button>
            </div>
        </aside>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 h-[60px] bg-white border-t flex items-center justify-between px-6 z-[100]">
        <button onclick="navPrev()" class="flex items-center gap-2 text-xs font-black uppercase text-gray-600">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M15 19l-7-7 7-7"></path></svg> Prev
        </button>
        
        <button onclick="openSyncModal()" class="bg-blue-600 text-white px-8 py-2.5 rounded-full text-[11px] font-black uppercase shadow-xl hover:bg-blue-700 transition-all active:scale-95 border-2 border-white">
            🚀 Update GitHub
        </button>

        <button onclick="navNext()" class="flex items-center gap-2 text-xs font-black uppercase text-blue-600">
            Next <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
        </button>
    </nav>



    <div id="syncModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-[200] p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
            <h2 class="text-xl font-black text-blue-700 mb-2">PUSH TO PRODUCTION</h2>
            <div id="changeLog" class="bg-gray-50 border border-dashed p-4 h-40 overflow-y-auto font-mono text-[10px] mb-6 whitespace-pre-wrap"></div>
            <div class="flex gap-3">
                <button onclick="closeSyncModal()" class="flex-1 py-3 bg-gray-100 text-[10px] font-black uppercase rounded-lg">Abort</button>
                <button id="finalPushBtn" onclick="pushToProd()" class="flex-1 py-3 bg-blue-600 text-white text-[10px] font-black uppercase rounded-lg shadow-xl">Commit Changes</button>
            </div>
        </div>
    </div>
    
    
<script>
    const WORKER_BASE = "https://mmh-question-reports-1.sscgkgspreparation.workers.dev/";
    let FULL_QUIZ = null;
    let MODIFIED_QUIZ = null;
    let QUESTIONS = [];
    let currentIdx = 0;
    let currentSec = "";
    let folderType = "";
    let GITHUB_PATH = "";
    let editedIds = new Set();
    let reportedId = null;
    
    
        // --- 1. MATHJAX & NORMALIZATION ---
    window.MathJax = {
        tex: {
            inlineMath: [['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true
        },
        chtml: {
            mtextInheritFont: false,
            displayAlign: 'left',
            linebreaks: { 
                allow: true,      
                width: 'container', 
                overflow: 'linebreak' 
            }
        },
        options: {
            skipHtmlTags: ['script', 'style', 'textarea', 'pre']
        }
    };

    function normalizeMathForQuiz(container) {
        if (!container) return;
        // Convert $$...$$ block math to \(...\) inline math for better flow
        container.innerHTML = container.innerHTML
            .replace(/(\S)\s*\$\$(.+?)\$\*\s*(\S)/g, '$1 \\($2\\) $3')
            .replace(/\$\$(.+?)\$\$/g, '\\($1\\)');
    }

    // --- 2. PARAMETER PARSING ---
    function parseParams() {
        const params = new URLSearchParams(window.location.search);
        let id = params.get('id');
        let path = params.get('path');
        let qid = params.get('qid');
        
        const startapp = params.get('startapp');
        if (startapp) {
            const parts = startapp.split('__');
            if (parts.length >= 3) {
                id = parts[0];
                path = parts[1].replace(/_/g, '/');
                qid = parts[2];
            }
        }
        
        if (id) document.getElementById('targetQuizId').value = id;
        if (path) {
            document.getElementById('targetPath').value = path;
            GITHUB_PATH = path;
        }
        if (qid) reportedId = qid;

        if (id && path) fetchQuizData();
    }
    
   

    let currentLang = "en"; // Global language state

    // Template Logic: Returns Hindi if available, otherwise English fallback
    const getLangText = (obj) => {
        if (!obj) return "";
        
        const decodeHTML = (html) => {
            const txt = document.createElement("textarea");
            txt.innerHTML = html;
            return txt.value;
        };

        let rawText = "";
        if (typeof obj === "string") {
            rawText = obj;
        } else if (currentLang === "bilingual") {
            const enText = obj.en || "";
            const hiText = obj.hi || "";
            rawText = enText + (enText && hiText ? "<hr style='border:none; border-top:1px dashed #ccc; margin:10px 0;'>" : "") + hiText;
        } else {
            // Fallback Logic: if hi string is empty, show en
            rawText = obj[currentLang] || obj["en"] || "";
        }

        return decodeHTML(rawText);
    };

    // Template Logic: Bolding style
    function applyBoldHighlight(html) {
        if (!html || typeof html !== "string") return html;
        return html.replace(/\*\*(.*?)\*\*/g, '<strong style="font-weight: 800; color: #000;">$1</strong>');
    }

    // Listener for language changes
    document.addEventListener('change', function(e) {
        if (e.target && e.target.id === 'cardLangSelect') {
            currentLang = e.target.value;
            renderQuestion(currentIdx);
        }
    });

    // --- 2. DATA FETCHING ---
    async function fetchQuizData() {
        const id = document.getElementById('targetQuizId').value.trim();
        const path = document.getElementById('targetPath').value.trim();
        GITHUB_PATH = path;
        
        log(`Fetching Blob: ${id} from ${path}...`);
        try {
            const res = await fetch(`${WORKER_BASE}?action=GET_QUIZ&id=${id}&path=${path}`);
            if(!res.ok) throw new Error("File not found in Registry.");
            
            const data = await res.json();
            FULL_QUIZ = JSON.parse(JSON.stringify(data.quiz));
            MODIFIED_QUIZ = data.quiz;
            folderType = data.folderType;
            
            document.getElementById('metaContainer').classList.remove('hidden');
            document.getElementById('questionArea').classList.remove('hidden');
            document.getElementById('metaIdDisp').innerText = id;
            
            const secs = Object.keys(MODIFIED_QUIZ.sections);
            renderSectionTabs(secs);
            switchSection(secs[0]);
            
            if(reportedId) jumpToId(reportedId);
            log(`Success! Environment: ${folderType.toUpperCase()}`);
        } catch (err) {
            log(err.message, 'error');
            alert(err.message);
        }
    }

    // --- 3. RENDERING ENGINE (Bridges both JSON formats) ---
    function switchSection(name) {
        currentSec = name;
        const rawSec = MODIFIED_QUIZ.sections[name];
        // Conditional logic to support flat arrays vs nested questions
        QUESTIONS = Array.isArray(rawSec) ? rawSec : rawSec.questions;
        renderSectionTabs(Object.keys(MODIFIED_QUIZ.sections));
        renderPalette();
        renderQuestion(0);
    }

function renderQuestion(idx) {
    currentIdx = idx;
    const q = QUESTIONS[idx];
    const qid = String(q.id);
    
    // Editor UI updates
    document.getElementById('qNum').innerText = idx + 1;
    if(document.getElementById('navProgress')) {
        document.getElementById('navProgress').innerText = `${idx + 1} / ${QUESTIONS.length}`;
    }
    document.getElementById('editStatus').classList.toggle('hidden', !editedIds.has(qid));
    
    // 1. Render Question Text with Normalization
    const qTextContainer = document.getElementById('qTextBody');
    qTextContainer.innerHTML = applyBoldHighlight(getLangText(q.question));
    normalizeMathForQuiz(qTextContainer);

    // Dynamic image pathing
    const cleanIdx = parseInt(qid.slice(1));
    const pathSegments = GITHUB_PATH.split('/');
    const imgBase = `${pathSegments[0]}/${pathSegments[1]}`;
    const quizId = document.getElementById('targetQuizId').value;
    
    const qImgUrl = q.question_image || `https://raw.githubusercontent.com/mockmatrixhub/mmhimg/main/${imgBase}/${quizId}/q-${cleanIdx}-image1.jpg`;
    document.getElementById('qImageBox').innerHTML = `<img src="${qImgUrl}" class="max-w-full border rounded-lg" onerror="this.style.display='none'">`;

    // 2. Render Options with Template Styling
    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = "";
    [1, 2, 3, 4, 5].forEach(i => {
        const optKey = `option_${i}`;
        if(q[optKey]) {
            const div = document.createElement('div');
            div.className = `opt ${String(q.answer) === String(i) ? 'correct' : ''}`;
            const optImgUrl = `https://raw.githubusercontent.com/mockmatrixhub/mmhimg/main/${imgBase}/${quizId}/q-${cleanIdx}-image${i+1}.jpg`;
            
            div.innerHTML = `
                <div class="custom-radio"></div>
                <div class="flex flex-col">
                    <div class="opt-text">${applyBoldHighlight(getLangText(q[optKey]))}</div>
                    <img src="${optImgUrl}" class="mt-2 max-w-[180px] border rounded" onerror="this.style.display='none'">
                </div>
            `;
            grid.appendChild(div);
            // Normalizing math for each option
            normalizeMathForQuiz(div.querySelector('.opt-text'));
        }
    });

    // 3. Render Solution Area with Styled Images
    const sol = document.getElementById('solArea');
    if (q.solution_text || q.solution_image) {
        sol.classList.remove('hidden');
        const solTextContainer = document.getElementById('solTextBody');
        solTextContainer.innerHTML = applyBoldHighlight(getLangText(q.solution_text));
        normalizeMathForQuiz(solTextContainer);
        
        const sImgUrl = q.solution_image || `https://raw.githubusercontent.com/mockmatrixhub/mmhimg/main/${imgBase}/${quizId}/q-${cleanIdx}-image6.jpg`;
        // Added 'sol-img-styled' for template consistency
        document.getElementById('solImageBox').innerHTML = `<img src="${sImgUrl}" class="sol-img-styled max-w-full border rounded-lg" onerror="this.style.display='none'">`;
    } else {
        sol.classList.add('hidden');
    }

    // 4. Final MathJax Processing
    if(window.MathJax) MathJax.typesetPromise();
    
    highlightPalette();
    if(!document.getElementById('inlineEditor').classList.contains('hidden')) {
        document.getElementById('jsonBox').value = JSON.stringify(q, null, 4);
    }
}

    

    // --- 4. EDITOR LOGIC ---
    function saveQEdit() {
        try {
            const updated = JSON.parse(document.getElementById('jsonBox').value);
            QUESTIONS[currentIdx] = updated;
            editedIds.add(String(updated.id));
            renderQuestion(currentIdx);
            log(`Q-${updated.id} saved to memory.`);
        } catch (e) { alert("Invalid JSON Syntax!"); }
    }

    function resetCurrentQ() {
        const original = FULL_QUIZ.sections[currentSec];
        const qList = Array.isArray(original) ? original : original.questions;
        QUESTIONS[currentIdx] = JSON.parse(JSON.stringify(qList[currentIdx]));
        editedIds.delete(String(QUESTIONS[currentIdx].id));
        renderQuestion(currentIdx);
    }

    // --- 5. WORKER BRIDGE SYNC ---
    async function pushToProd() {
        const btn = document.getElementById('finalPushBtn');
        btn.disabled = true; btn.innerText = "UPLOADING...";
        
        const id = document.getElementById('targetQuizId').value;
        const path = document.getElementById('targetPath').value;
        
        try {
            const res = await fetch(`${WORKER_BASE}?action=UPDATE_QUIZ&id=${id}&path=${path}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ updatedData: MODIFIED_QUIZ, folderType: folderType })
            });
            if(res.ok) {
                alert("Success!");
                location.reload();
            } else throw new Error("Sync Failed.");
        } catch (err) {
            alert(err.message);
            btn.disabled = false; btn.innerText = "Commit Changes";
        }
    }

    function log(msg, type='info') {
        const c = document.getElementById('mobileConsole');
        c.innerHTML += `<div class="mb-1 ${type==='error'?'text-red-500':''} border-b border-gray-800">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        c.scrollTop = c.scrollHeight;
    }

    function toggleConsole() { const c = document.getElementById('mobileConsole'); c.style.display = c.style.display==='none'?'block':'none'; }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function toggleEditor() { document.getElementById('inlineEditor').classList.toggle('hidden'); if(!document.getElementById('inlineEditor').classList.contains('hidden')) renderQuestion(currentIdx); }
    function toggleMetaEditor() { document.getElementById('metaDetails').classList.toggle('hidden'); document.getElementById('metaJson').value = JSON.stringify(MODIFIED_QUIZ.meta, null, 4); }
    function saveMeta() { MODIFIED_QUIZ.meta = JSON.parse(document.getElementById('metaJson').value); toggleMetaEditor(); log("Meta Updated."); }
    function navNext() { if(currentIdx < QUESTIONS.length-1) renderQuestion(currentIdx+1); }
    function navPrev() { if(currentIdx > 0) renderQuestion(currentIdx-1); }
    function jumpToId(id) {
        for(let s in MODIFIED_QUIZ.sections) {
            const qs = Array.isArray(MODIFIED_QUIZ.sections[s]) ? MODIFIED_QUIZ.sections[s] : MODIFIED_QUIZ.sections[s].questions;
            const i = qs.findIndex(q => String(q.id) === String(id));
            if(i !== -1) { switchSection(s); renderQuestion(i); break; }
        }
    }
    function renderSectionTabs(secs) {
        const nav = document.getElementById('sectionNav'); nav.innerHTML = "";
        secs.forEach(s => {
            const btn = document.createElement('button');
            btn.className = `px-4 py-1.5 rounded-full text-[10px] font-black uppercase whitespace-nowrap ${s===currentSec?'bg-blue-600 text-white':'bg-gray-200 text-gray-500'}`;
            btn.innerText = s; btn.onclick = () => switchSection(s); nav.appendChild(btn);
        });
    }
    function renderPalette() {
        const g = document.getElementById('paletteGrid'); g.innerHTML = "";
        QUESTIONS.forEach((q, i) => {
            const d = document.createElement('div'); d.className = "p-item"; d.innerText = i+1;
            d.onclick = () => renderQuestion(i); g.appendChild(d);
        });
        
    }
    function highlightPalette() {
        const items = document.querySelectorAll('.p-item');
        items.forEach((item, i) => {
            item.className = "p-item";
            const qid = String(QUESTIONS[i].id);
            if(i === currentIdx) item.classList.add('p-active');
            if(editedIds.has(qid)) item.classList.add('p-edited');
            if(qid === reportedId) item.classList.add('p-reported');
            if(editedIds.has(qid) && qid === reportedId) item.classList.add('p-both');
        });
    }
    
        function openSyncModal() {
        const logBox = document.getElementById('changeLog');
        const isMetaChanged = JSON.stringify(FULL_QUIZ.meta) !== JSON.stringify(MODIFIED_QUIZ.meta);
        
        let summary = `🚨 PRODUCTION SYNC SUMMARY 🚨\n`;
        summary += `------------------------------\n`;
        summary += `TARGET: ${folderType.toUpperCase()} / ${GITHUB_PATH}\n\n`;
        
        summary += isMetaChanged ? `✅ [METADATA] -> EDITED\n` : `⚪ [METADATA] -> NO CHANGES\n`;
        
        if (editedIds.size > 0) {
            summary += `📝 [QUESTIONS] -> ${editedIds.size} EDITED\n`;
            summary += `   IDs: ${Array.from(editedIds).join(', ')}\n`;
        } else {
            summary += `📝 [QUESTIONS] -> NO CHANGES\n`;
        }
        
        summary += `------------------------------\n`;
        summary += `⚠️ WARNING: This will update the production file on GitHub.`;
        
        logBox.innerText = summary;
        document.getElementById('syncModal').style.display = "flex";
    }

    function closeSyncModal() {
        document.getElementById('syncModal').style.display = "none";
    }

    
    window.onload = parseParams;
    document.getElementById('jumpIdx').onchange = (e) => {
        const val = parseInt(e.target.value);
        if(val > 0 && val <= QUESTIONS.length) renderQuestion(val-1);
    };
</script>

</body>
</html>
