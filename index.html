<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMH MASTER EDITOR - Pro Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* --- UI FROM TEMPLATE: test-t2-s (8).html --- */
        :root {
            --accent: #0b5ed7;
            --success: #198754;
            --danger: #dc3545;
            --border-color: #333333;
            --bg-main: #f5f7fa;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: #212121; overflow: hidden; height: 100vh; }

        /* Solid UI Elements */
        .card { background: #ffffff; border: 1.25px solid var(--border-color); border-radius: 0; width: 100%; box-sizing: border-box; }
        .qbar { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; border-bottom: 1.25px solid var(--border-color); background: #fff; }
        .qmeta { font-size: 14px; font-weight: 600; color: #111; }
        .qtext { padding: 12px 14px; font-size: 16px; line-height: 1.5; color: #111; font-weight: 500; border-bottom: 1.25px solid var(--border-color); background: #fff; }
        
        /* Options Grid */
        .opt { display: grid; grid-template-columns: 48px 1fr; border-bottom: 1.25px solid var(--border-color); background: #fff; }
        .opt.correct { background-color: #dff5e7; }
        .opt-text { padding: 10px 14px; font-size: 15px; color: #111; font-weight: 500; }
        
        .custom-radio { position: relative; display: flex; align-items: center; justify-content: center; border-right: 1.25px solid var(--border-color); width: 100%; min-height: 42px; }
        .custom-radio::before { content: ""; width: 18px; height: 18px; border: 2px solid #757575; border-radius: 50%; }
        .opt.correct .custom-radio::before { border-color: var(--success); background: var(--success); }
        .opt.correct .custom-radio::after { content: ""; position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%; }

        /* Palette States */
        .p-item { width: 42px; height: 35px; display: flex; align-items: center; justify-content: center; border: 1px solid #ababab; cursor: pointer; font-weight: 700; font-size: 13px; background: linear-gradient(to bottom, #ffffff 0%, #f2f2f2 100%); border-radius: 2px; }
        .p-active { clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 50% 100%, 0% 70%); background: var(--danger) !important; color: white; border: none; }
        .p-edited { background: var(--success) !important; color: white; border-color: var(--success); }
        .p-reported { background: #f97316 !important; color: white; border-color: #f97316; }

        /* Fixed Navigation */
        .section-nav { display: flex; gap: 8px; padding: 10px 16px; background: #fff; border-bottom: 2px solid #eee; overflow-x: auto; white-space: nowrap; }
        .sec-btn { padding: 8px 18px; background: #0000ff; color: #fff; border-radius: 4px; font-weight: 700; font-size: 13px; text-transform: uppercase; }
        .sec-btn.active { background: #008000 !important; }

        .fbar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #ddd; padding: 10px; display: flex; justify-content: space-between; gap: 8px; z-index: 1000; height: 70px; }
        .fbar button { flex: 1; padding: 12px 4px; font-size: 13px; border-radius: 8px; background: #0b5ed7; color: #fff; font-weight: 700; text-transform: uppercase; }

        #mobileConsole { position: fixed; bottom: 75px; left: 0; right: 0; height: 25vh; background: #1e1e1e; color: #00ff00; font-family: 'Fira Code', monospace; font-size: 11px; padding: 10px; overflow-y: auto; z-index: 1100; border-top: 3px solid #444; display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Math & Tables */
        mjx-container { max-width: 100% !important; overflow-x: auto !important; }
        table { border-collapse: collapse; width: 100%; border: 1px solid #333; margin: 10px 0; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
    </style>

    <script>
        window.MathJax = { tex: { inlineMath: [['\\(', '\\)']], displayMath: [['$$', '$$']] }, chtml: { displayAlign: 'left' } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body class="flex flex-col">

    <div id="mobileConsole"></div>

    <header class="bg-white border-b px-4 py-2 flex items-center justify-between shadow-sm z-50 h-[60px]">
        <div class="flex items-center gap-3">
            <div>
                <h1 class="text-sm font-black text-blue-700 leading-none">MMH MASTER</h1>
                <span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest">Production v2.6</span>
            </div>
            <div class="flex items-center bg-gray-100 rounded-lg px-2 py-1 border border-gray-200">
                <input id="targetQuizId" type="text" placeholder="ID" class="bg-transparent outline-none text-[10px] font-bold w-20">
                <input id="targetPath" type="text" placeholder="Path (e.g. ssc/cgl)" class="bg-transparent outline-none text-[10px] font-bold w-32 border-l pl-2 ml-2 border-gray-300">
                <button onclick="fetchQuizData()" class="text-blue-600 font-black text-[10px] ml-2">LOAD</button>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleConsole()" class="p-1.5 rounded bg-gray-800 text-white text-[9px] font-bold uppercase">Logs</button>
            <select id="langSelect" onchange="changeLang(this.value)" class="text-[10px] font-bold border rounded px-1">
                <option value="en">EN</option>
                <option value="hi">HI</option>
                <option value="bilingual">BI</option>
            </select>
        </div>
    </header>

    <div id="sectionNav" class="section-nav hidden"></div>

    <main class="flex-1 flex overflow-hidden">
        <section class="flex-1 overflow-y-auto p-4 lg:p-10 bg-gray-50 no-scrollbar pb-32">
            
            <div id="metaBox" class="max-w-3xl mx-auto mb-4 bg-white border border-[#333] hidden">
                <div class="p-3 flex justify-between items-center bg-gray-50 border-b border-[#333]">
                    <span class="text-[11px] font-bold text-gray-600 uppercase">Quiz ID: <span id="metaId" class="text-blue-600"></span></span>
                    <button onclick="toggleMetaEditor()" class="text-[10px] font-black text-blue-600 underline uppercase">Edit Raw Meta & JSON</button>
                </div>
                <div id="metaEditor" class="hidden p-3 bg-gray-900">
                    <textarea id="metaJson" class="w-full h-40 bg-black text-green-400 p-2 text-[10px] font-mono rounded no-scrollbar"></textarea>
                    <button onclick="saveMeta()" class="mt-2 w-full bg-green-600 text-white py-2 text-[10px] font-black uppercase">Apply Meta to Local</button>
                </div>
            </div>

            <div id="questionArea" class="max-w-3xl mx-auto hidden">
                <div class="card">
                    <div class="qbar">
                        <div class="qmeta">Question <span id="qNum">1</span> <span id="qIdDisplay" class="ml-4 text-[10px] text-gray-400 font-mono"></span></div>
                        <button onclick="toggleEditor()" class="bg-blue-600 text-white px-3 py-1 rounded text-[10px] font-bold uppercase">Edit Source</button>
                    </div>

                    <div class="qtext">
                        <div id="qText"></div>
                        <div id="qImage" class="mt-2"></div>
                    </div>
                    
                    <div id="optionsGrid" class="options"></div>

                    <div id="solArea" class="p-4 bg-blue-50 border-t border-[#333] hidden">
                        <div class="text-[11px] font-bold text-blue-700 uppercase mb-2">Solution Explanation</div>
                        <div id="solText" class="text-sm text-gray-700 leading-relaxed"></div>
                        <div id="solImage" class="mt-3"></div>
                    </div>
                </div>

                <div id="inlineEditor" class="hidden mt-4 bg-gray-900 border-2 border-blue-500 p-4 rounded-xl">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-blue-400 text-[10px] font-black uppercase">JSON Editor</span>
                        <button onclick="saveQEdit()" class="bg-green-600 text-white px-4 py-1.5 rounded text-[10px] font-black uppercase">Save & Render</button>
                    </div>
                    <textarea id="jsonBox" spellcheck="false" class="w-full h-80 bg-black text-green-400 p-3 text-xs font-mono rounded outline-none no-scrollbar"></textarea>
                </div>
            </div>
        </section>

        <aside id="sidebar" class="w-64 border-l bg-[#dae5f0] flex flex-col z-40 lg:relative fixed right-[-100%] top-[60px] h-full transition-all duration-300">
            <div class="p-3 border-b bg-white flex justify-between items-center">
                <span class="font-black text-[10px] uppercase">Palette</span>
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-400">✕</button>
            </div>
            <div id="palette" class="flex-1 overflow-y-auto p-3 grid grid-cols-4 gap-2 content-start no-scrollbar"></div>
        </aside>
    </main>

    <div class="fbar">
        <button onclick="prevQ()">Previous</button>
        <button onclick="openUpdateModal()" id="syncBtn" class="hidden !bg-purple-700">Update Quiz Final</button>
        <button onclick="nextQ()">Save & Next</button>
    </div>

    <div id="syncModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-[2000] p-4 backdrop-blur-sm">
        <div class="bg-white rounded-[40px] w-full max-w-md p-10 shadow-2xl">
            <h2 class="text-2xl font-black text-blue-700 mb-2 italic">SYNC TO PRODUCTION</h2>
            <div id="changeLog" class="bg-gray-50 p-4 h-40 overflow-y-auto text-[10px] font-mono mb-6 border rounded-2xl border-dashed"></div>
            <div class="flex gap-3">
                <button onclick="closeSyncModal()" class="flex-1 py-4 bg-gray-100 rounded-2xl text-[10px] font-black uppercase text-gray-400">Abort</button>
                <button onclick="pushToProd()" id="finalPushBtn" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl text-[10px] font-black uppercase">Push to Main</button>
            </div>
        </div>
    </div>

    <button onclick="toggleSidebar()" class="lg:hidden fixed bottom-24 right-6 w-12 h-12 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center z-[1100]">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
    </button>

    <script>
        const WORKER_BASE = "https://mmh-question-reports-1.sscgkgspreparation.workers.dev/";
        let MODIFIED_QUIZ = null;
        let QUESTIONS = [];
        let currentIdx = 0;
        let currentSec = "";
        let currentLang = "en";
        let editedIds = new Set();
        let reportedId = null;

        function log(msg, type = 'info') {
            const c = document.getElementById('mobileConsole');
            const div = document.createElement('div');
            div.className = `p-1 border-b border-gray-800 ${type === 'error' ? 'text-red-500' : ''}`;
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            c.appendChild(div);
            c.scrollTop = c.scrollHeight;
        }

        function toggleConsole() { const c = document.getElementById('mobileConsole'); c.style.display = (c.style.display === 'none' || c.style.display === '') ? 'block' : 'none'; }

        async function fetchQuizData() {
            const id = document.getElementById('targetQuizId').value.trim();
            const path = document.getElementById('targetPath').value.trim();
            if(!id || !path) return alert("ID and Path required!");
            log(`Loading ${id}...`);
            try {
                const res = await fetch(`${WORKER_BASE}?action=GET_QUIZ&id=${id}&path=${path}`);
                const data = await res.json();
                MODIFIED_QUIZ = data.quiz;
                initUI();
            } catch (err) { log("Fetch failed", "error"); }
        }

        function initUI() {
            const secs = Object.keys(MODIFIED_QUIZ.sections);
            renderSectionTabs(secs);
            switchSection(secs[0]);
            document.getElementById('metaBox').classList.remove('hidden');
            document.getElementById('questionArea').classList.remove('hidden');
            document.getElementById('syncBtn').classList.remove('hidden');
            document.getElementById('sectionNav').classList.remove('hidden');
            document.getElementById('metaId').innerText = MODIFIED_QUIZ.meta.id;
            if(reportedId) jumpToId(reportedId);
        }

        function renderSectionTabs(secs) {
            const nav = document.getElementById('sectionNav');
            nav.innerHTML = "";
            secs.forEach(s => {
                const btn = document.createElement('button');
                btn.className = `sec-btn ${s === currentSec ? 'active' : ''}`;
                btn.innerText = s;
                btn.onclick = () => switchSection(s);
                nav.appendChild(btn);
            });
        }

        function switchSection(name) {
            currentSec = name;
            const raw = MODIFIED_QUIZ.sections[name];
            // --- PARSING LOGIC: HANDLES BOTH JSON STRUCTURES ---
            if (Array.isArray(raw)) {
                QUESTIONS = raw;
            } else if (raw && raw.questions) {
                QUESTIONS = raw.questions;
            } else {
                QUESTIONS = [];
            }
            renderPalette();
            renderQuestion(0);
            renderSectionTabs(Object.keys(MODIFIED_QUIZ.sections));
        }

        /* --- RENDERING: Direct copy-paste logic from template --- */
        function renderQuestion(idx) {
            currentIdx = idx;
            const q = QUESTIONS[idx];
            if (!q) return;

            document.getElementById('qNum').innerText = idx + 1;
            document.getElementById('qIdDisplay').innerText = `ID: ${q.id}`;
            document.getElementById('qText').innerHTML = applyBold(getLangText(q.question));
            
            // Image Construction Fallback
            const pathSegments = document.getElementById('targetPath').value.split('/');
            const imgBase = `https://raw.githubusercontent.com/mockmatrixhub/mmhimg/main/${pathSegments[0]}/${pathSegments[1]}/${document.getElementById('targetQuizId').value}/`;
            const cleanId = parseInt(String(q.id).slice(1));
            const imgStyle = "max-width:90%; max-height:250px; display:block; margin:10px auto; border:1px solid #333; border-radius:6px;";

            const qImgBox = document.getElementById('qImage');
            if(q.question_image) {
                qImgBox.innerHTML = `<img src="${q.question_image}" style="${imgStyle}">`;
            } else {
                const dynUrl = `${imgBase}q-${cleanId}-image1.jpg`;
                qImgBox.innerHTML = `<img src="${dynUrl}" style="${imgStyle} display:none;" onload="this.style.display='block'" onerror="this.style.display='none'">`;
            }

            // Options
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = "";
            [1, 2, 3, 4, 5].forEach(i => {
                if(q[`option_${i}`]) {
                    const div = document.createElement('div');
                    div.className = `opt ${String(q.answer) === String(i) ? 'correct' : ''}`;
                    const optImg = q[`option_image_${i}`] || `${imgBase}q-${cleanId}-image${i+1}.jpg`;
                    div.innerHTML = `
                        <div class="custom-radio"></div>
                        <div class="flex-1">
                            <div class="opt-text">${applyBold(getLangText(q[`option_${i}`]))}</div>
                            <img src="${optImg}" style="max-width:180px; display:none;" onload="this.style.display='block'" onerror="this.style.display='none'">
                        </div>`;
                    grid.appendChild(div);
                }
            });

            // Solution
            const sol = document.getElementById('solArea');
            if(q.solution_text || q.solution_image) {
                sol.classList.remove('hidden');
                document.getElementById('solText').innerHTML = applyBold(getLangText(q.solution_text));
                const solImg = q.solution_image || `${imgBase}q-${cleanId}-image6.jpg`;
                document.getElementById('solImage').innerHTML = `<img src="${solImg}" class="max-w-full border" style="display:none;" onload="this.style.display='block'" onerror="this.style.display='none'">`;
            } else sol.classList.add('hidden');

            if(window.MathJax) MathJax.typesetPromise();
            highlightPalette();
            if(!document.getElementById('inlineEditor').classList.contains('hidden')) {
                document.getElementById('jsonBox').value = JSON.stringify(q, null, 4);
            }
        }

        function getLangText(obj) {
            if(!obj) return "";
            if(typeof obj === 'string') return obj;
            if(currentLang === 'bilingual') return (obj.en || "") + "<hr style='border:none; border-top:1.25px dashed #333; margin:10px 0;'>" + (obj.hi || "");
            return obj[currentLang] || obj.en || "";
        }

        function applyBold(html) { return html.replace(/\*\*(.*?)\*\*/g, '<strong style="font-weight: 800; color: #000;">$1</strong>'); }

        function renderPalette() {
            const p = document.getElementById('palette');
            p.innerHTML = "";
            QUESTIONS.forEach((_, i) => {
                const btn = document.createElement('div');
                btn.className = "p-item";
                btn.innerText = i + 1;
                btn.onclick = () => renderQuestion(i);
                p.appendChild(btn);
            });
        }

        function highlightPalette() {
            const items = document.querySelectorAll('.p-item');
            items.forEach((item, i) => {
                const qId = String(QUESTIONS[i].id);
                item.classList.remove('p-active', 'p-edited', 'p-reported');
                if(i === currentIdx) item.classList.add('p-active');
                if(editedIds.has(qId)) item.classList.add('p-edited');
                if(qId === reportedId) item.classList.add('p-reported');
            });
        }

        function toggleEditor() { 
            const ed = document.getElementById('inlineEditor');
            ed.classList.toggle('hidden');
            if(!ed.classList.contains('hidden')) document.getElementById('jsonBox').value = JSON.stringify(QUESTIONS[currentIdx], null, 4);
        }

        function saveQEdit() {
            try {
                const updated = JSON.parse(document.getElementById('jsonBox').value);
                QUESTIONS[currentIdx] = updated;
                editedIds.add(String(updated.id));
                log(`Saved ID ${updated.id}`);
                renderQuestion(currentIdx);
            } catch (e) { alert("JSON ERROR"); }
        }

        function nextQ() { if(currentIdx < QUESTIONS.length - 1) renderQuestion(currentIdx + 1); }
        function prevQ() { if(currentIdx > 0) renderQuestion(currentIdx - 1); }

        function toggleMetaEditor() { 
            document.getElementById('metaEditor').classList.toggle('hidden'); 
            document.getElementById('metaJson').value = JSON.stringify(MODIFIED_QUIZ.meta, null, 4); 
        }

        function saveMeta() { 
            try { 
                MODIFIED_QUIZ.meta = JSON.parse(document.getElementById('metaJson').value); 
                toggleMetaEditor(); 
                log("Meta updated."); 
            } catch(e){ alert("JSON ERROR"); } 
        }

        function openUpdateModal() {
            const logBox = document.getElementById('changeLog');
            logBox.innerText = `Folder: ${document.getElementById('targetPath').value}\nModified: ${editedIds.size}\nIDs: ${Array.from(editedIds).join(', ')}`;
            document.getElementById('syncModal').classList.remove('hidden');
        }

        function closeSyncModal() { document.getElementById('syncModal').classList.add('hidden'); }

        async function pushToProd() {
            const btn = document.getElementById('finalPushBtn');
            btn.innerText = "PUSHING..."; btn.disabled = true;
            try {
                const res = await fetch(`${WORKER_BASE}?action=UPDATE_QUIZ&id=${document.getElementById('targetQuizId').value}&path=${document.getElementById('targetPath').value}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ updatedData: MODIFIED_QUIZ })
                });
                if(res.ok) { alert("Sync Successful!"); location.reload(); }
            } catch (e) { alert("Push failed"); btn.disabled = false; }
        }

        function toggleSidebar() { 
            const s = document.getElementById('sidebar');
            s.classList.toggle('right-0');
            s.classList.toggle('right-[-100%]');
        }
        
        function changeLang(v) { currentLang = v; renderQuestion(currentIdx); }

        function jumpToId(id) {
            for(const s in MODIFIED_QUIZ.sections) {
                const raw = MODIFIED_QUIZ.sections[s];
                const qs = Array.isArray(raw) ? raw : raw.questions;
                const idx = qs.findIndex(q => String(q.id) === String(id));
                if(idx !== -1) { switchSection(s); renderQuestion(idx); break; }
            }
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const startapp = params.get('startapp');
            if(startapp) {
                const [id, path, qid] = startapp.split('__');
                document.getElementById('targetQuizId').value = id;
                document.getElementById('targetPath').value = path.replace(/_/g, '/');
                reportedId = qid;
                fetchQuizData();
            }
        };
    </script>
</body>
</html>
